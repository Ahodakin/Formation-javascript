<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation 2</title>
</head>
<body>
    <h1>Formation 2</h1>
<script>
    // Déclaration d'une constante 'name' et assignation de la valeur "Queen"
    const name = "Queen";
    
    // Affiche la valeur de 'name' dans la console → Résultat : "Queen"
    console.log(name);

    // Création d'un objet 'user' avec une propriété 'name' initialisée à "Queen"
    const user = {
        name: "Queen",
    }

    // Modification de la propriété 'name' de l'objet 'user'
    user.name = "Reine";

    console.log(user);
</script>
</body>
</html>
